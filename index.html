<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page - Mabo Giqwa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle, #0a0a0a, #111);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        header {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            box-sizing: border-box;
        }

        .contact-info {
            cursor: pointer;
            color: #bbb;
            transition: color 0.3s;
        }

        .contact-info:hover {
            color: #fff;
        }

        header nav a {
            color: #bbb;
            margin: 0 15px;
            text-decoration: none;
            font-weight: 400;
            transition: color 0.3s;
        }

        header nav a:hover {
            color: #fff;
        }

        .hamburger {
            display: none;
            font-size: 24px;
            color: #bbb;
            cursor: pointer;
        }

        .profile-container {
            max-width: 600px;
            padding: 0 20px;
        }

        .profile-container img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
        }

        .profile-container h2 {
            font-size: 28px;
            font-weight: 600;
            margin: 10px 0;
        }

        .profile-container p {
            font-size: 18px;
            font-weight: 300;
            color: #bbb;
            margin: 5px 0;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .social-links a {
            color: #bbb;
            font-size: 20px;
            transition: color 0.3s;
        }

        .social-links a:hover {
            color: #fff;
        }

        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            text-align: center;
            padding: 15px;
            font-size: 16px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
        }

        @media (max-width: 768px) {
            header nav {
                display: none;
            }

            .hamburger {
                display: block;
            }

            .menu-active nav {
                display: flex;
                flex-direction: column;
                position: absolute;
                top: 70px;
                right: 20px;
                background: rgba(0, 0, 0, 0.9);
                padding: 15px;
                border-radius: 5px;
                gap: 10px;
            }

            .profile-container {
                margin-top: 60px;
            }

            .profile-container img {
                width: 150px;
                height: 150px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="contact-info" onclick="showEmail()">Contact Information</div>

        <div class="hamburger" onclick="toggleMenu()">
            <i class="fas fa-bars"></i>
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="articles.html">Blog</a>
            <a href="projects.html">Projects</a>
        </nav>
    </header>

    <div class="profile-container">
        <img src="images/profile picture.png" alt="Profile Picture">
        <h2>Mabo Giqwa</h2>
        <p>Mathematics and Computer Science student</p>
        <p>Aspiring ML Engineer</p>
        <div class="social-links">
            <a href="https://www.linkedin.com/in/mabo-giqwa-7880522b5/" target="_blank">
                <i class="fab fa-linkedin"></i>
            </a>
            <a href="https://github.com/mabogiqwa" target="_blank">
                <i class="fab fa-github"></i>
            </a>
        </div>
    </div>

    <footer>
        Stay curious, stay inspired
    </footer>

    <script>
        function toggleMenu() {
            document.body.classList.toggle('menu-active');
        }

        function showEmail() {
            alert("Email: mabogiqwa1@gmail.com");
        }
    </script>
</body>
</html>
